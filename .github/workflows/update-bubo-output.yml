name: Update Bubo Output

on:
  push:
    branches:
      - main
    paths:
      - config/feeds.json
      - config/template.html
      - src/**
      - package.json
      - package-lock.json
      - tsconfig.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Bubo output
        run: npm run build:bubo

      - name: Commit updated output
        run: |
          if git diff --quiet -- public/index.html; then
            echo "No changes in public/index.html"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/index.html
          git commit -m "chore: update generated bubo output"
          git push
